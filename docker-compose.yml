version: '3.8'

services:
  postgres-vector:
    image: pgvector/pgvector:pg16
    container_name: lean-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=lean_memory
    ports:
      - "5432:5432"
    volumes:
      - lean-pg-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  lean-pg-data: